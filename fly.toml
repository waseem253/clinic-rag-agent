# Fly.io deployment for the FastAPI backend.
# Region: iad (US East — close to Anthropic/Voyage/Cohere data centers).
# Always-on machine on shared-cpu-1x (free tier).

app = "clinic-rag-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 25
    hard_limit = 50

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
